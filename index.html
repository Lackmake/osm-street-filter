<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OSM Street Inclusion Filter Map</title>
  <meta name="description" content="Browse OpenStreetMap streets live and inspect street inclusion/exclusion filter status and step-by-step rules without a backend server.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./src/style.css">
</head>
<body>
  <div id="app">
    <!-- Header Navbar -->
    <header class="navbar">
      <div class="brand">
        <div class="brand-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
            <polyline points="14 2 14 8 20 8"/>
            <path d="M9 15l2 2 4-4"/>
          </svg>
        </div>
        <div class="brand-text">
          <span class="title">OSM Street Filter</span>
          <span class="subtitle">Standalone Map Inspector</span>
        </div>
      </div>

      <!-- Location Search -->
      <div class="search-container">
        <div class="search-input-wrapper">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="search-input" placeholder="Search city, address, or location..." autocomplete="off">
          <button id="search-clear-btn" class="search-clear-btn" hidden>×</button>
        </div>
        <div id="search-results" class="search-results-dropdown" hidden></div>
      </div>

      <!-- Primary Action -->
      <div class="header-actions">
        <button id="header-fetch-btn" class="btn btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/>
            <path d="M21 3v5h-5"/>
          </svg>
          <span>Fetch Streets in View</span>
        </button>
      </div>
    </header>

    <!-- Main Container -->
    <main class="main-content">
      <!-- Sidebar -->
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
          <h2>Filter Controls</h2>
          <button id="sidebar-toggle-btn" class="icon-btn mobile-only" aria-label="Toggle sidebar">✕</button>
        </div>

        <div class="sidebar-scrollable">
          <!-- Primary Fetch Button in Sidebar -->
          <div class="card fetch-card">
            <button id="sidebar-fetch-btn" class="btn btn-primary btn-large btn-full">
              <span class="btn-spinner hidden" id="fetch-spinner"></span>
              <svg id="fetch-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/>
                <path d="m21 21-4.3-4.3"/>
              </svg>
              <span id="fetch-btn-label">Fetch Streets in View</span>
            </button>

            <!-- Status Banner -->
            <div id="status-banner" class="status-banner info">
              Zoom level: <strong id="zoom-level">14</strong> (Recommended 14+)
            </div>

            <!-- Provider Badge -->
            <div id="provider-badge" class="provider-badge">
              <span class="provider-dot"></span>
              <span id="provider-text">Overpass: overpass-api.de</span>
            </div>
          </div>

          <!-- Overpass Settings Card -->
          <div class="card settings-card">
            <div class="setting-title">Overpass API Endpoint</div>
            <div class="setting-input-group">
              <input type="url" id="custom-endpoint-input" placeholder="Custom Overpass URL (optional)" autocomplete="off">
              <button id="save-endpoint-btn" class="btn btn-sm btn-outline">Save</button>
            </div>
            <div class="setting-hint">Leave blank to use automatic failover default mirrors.</div>
          </div>

          <!-- View Mode & Layers Section -->
          <div class="display-mode-section">
            <div class="section-title">Display Mode</div>
            <div class="segmented-control">
              <button class="segmented-btn active" data-mode="included">Included</button>
              <button class="segmented-btn" data-mode="excluded">Excluded</button>
              <button class="segmented-btn" data-mode="both">Both</button>
            </div>

            <!-- Nature Areas Toggle -->
            <label class="toggle-option" style="margin-top: 10px;">
              <input type="checkbox" id="nature-areas-toggle">
              <span class="toggle-label">Show Nature Areas Layer</span>
            </label>
          </div>

          <!-- Highway Breakdown -->
          <div class="section-header">
            <span class="section-title">By Highway Type</span>
            <button id="type-reset-btn" class="btn-text">Show All</button>
          </div>

          <div id="highway-list" class="highway-list">
            <div class="empty-state">No streets fetched yet. Click "Fetch Streets in View".</div>
          </div>
        </div>
      </aside>

      <!-- Map Container -->
      <div id="map" class="map-container"></div>
    </main>
  </div>

  <script type="module" src="./src/app.js"></script>
</body>
</html>
